<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>專屬保單資料填寫系統</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Babel 來讓瀏覽器看得懂 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 隱藏捲軸但保留滾動功能 (讓手機介面更像 App) */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-[#F4F6F8]">
  <div id="root"></div>

  <!-- 使用 type="text/babel" 搭配 data-type="module" 來使用 ESM 模組引入 React -->
  <script type="text/babel" data-type="module">
    // 鎖定 React 版本為 18.3.1
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
    import { User, FileText, DollarSign, Users, CreditCard, CheckCircle, AlertCircle, ChevronRight, ChevronLeft, Plus, Trash2, Gift, Send, ShieldCheck, UsersRound, FilePlus2, Info } from 'https://esm.sh/lucide-react@0.378.0?deps=react@18.3.1';

    const App = () => {
      const scriptUrl = "https://script.google.com/macros/s/AKfycbxDWZQen5xtW0IbTb7B_QJRi96Ho-6fJPPln2M2snQhgTV33b2k0pOEizMV7q-xGW5i/exec";

      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null);
      const [currentStep, setCurrentStep] = useState(1);
      const formRef = useRef(null);

      const [hasAgreed, setHasAgreed] = useState(false);
      const [isFamilyContinuation, setIsFamilyContinuation] = useState(false); 
      
      // 家庭通訊錄、過濾與付款記憶狀態
      const [familyDirectory, setFamilyDirectory] = useState([]);
      const [pastInsuredIds, setPastInsuredIds] = useState([]); 
      const [inheritedPayment, setInheritedPayment] = useState(null);
      const [changePayment, setChangePayment] = useState(false);
      const [highlightToggle, setHighlightToggle] = useState(false); 

      const totalSteps = 6;
      
      // --- 日期與年份設定 (改為民國年) ---
      const currentYear = new Date().getFullYear();
      const currentMinguoYear = currentYear - 1911; // 換算為民國年
      const years = Array.from({ length: 106 }, (_, i) => currentMinguoYear - i); // 產生過去 106 年的民國年
      const months = Array.from({ length: 12 }, (_, i) => String(i + 1).padStart(2, '0'));
      const days = Array.from({ length: 31 }, (_, i) => String(i + 1).padStart(2, '0'));
      
      // 信用卡西元年份產生 (維持西元，動態產生)
      const currentYY = currentYear % 100;
      const creditCardYears = Array.from({length: 15}, (_, i) => String(currentYY + i));

      const financeOptions = ['無', '0~50萬', '50~100萬', '100~200萬', '200~300萬', '300~500萬', '500萬以上'];

      const [formData, setFormData] = useState({
        consent: false,
        insured: {
          name: '', id: '', birthDate: { Y: '', M: '', D: '' }, phone: '', email: '',
          height: '', weight: '', address: '', workPlace: '',
          jobTitle: '', jobContent: '', medicalHistory: ''
        },
        sameAsInsured: true,
        proposer: {
          name: '', id: '', birthDate: { Y: '', M: '', D: '' }, phone: '', email: '',
          contactAddress: '', billingAddress: '', workPlace: '',
          jobTitle: '', jobContent: '', relation: '配偶'
        },
        financialInsured: { 
          income: '', liabilities: '', 
          depositBank: '', depositAmount: '', stockAmount: '', 
          immovableHas: '無', immovableAddr: '', immovableSize: '', immovableValue: '' 
        },
        financialProposer: { 
          income: '', liabilities: '', 
          depositBank: '', depositAmount: '', stockAmount: '', 
          immovableHas: '無', immovableAddr: '', immovableSize: '', immovableValue: '' 
        },
        beneficiaries: [
          { key: Date.now(), rank: '1', name: '', uid: '', birthDate: { Y: '', M: '', D: '' }, relation: '' }
        ],
        payment: {
          payerSelection: '', // 儲存真實人名或 '其他'
          payerOtherName: '',
          method: '銀行轉帳', bankInfo: '', bankAccount: '',
          card1: '', card2: '', card3: '', card4: '',
          cardExpiryMM: '01', cardExpiryYY: String(currentYY)
        },
        needNewCard: '否'
      });

      // ==========================================
      // 衍生變數 (動態選項與通訊錄)
      // ==========================================
      const proposerName = formData.sameAsInsured ? formData.insured.name : formData.proposer.name;
      const insuredName = formData.insured.name;

      // 繳費授權人動態選項：絕對認名字不認身分
      const getPayerOptions = () => {
        const options = [];
        if (proposerName) {
          options.push({ id: proposerName, name: proposerName, role: '要保人' });
        }
        if (!formData.sameAsInsured && insuredName && insuredName !== proposerName) {
          options.push({ id: insuredName, name: insuredName, role: '被保險人' });
        }
        
        // 如果有繼承的付款人，且他不是當前的要保人或被保險人，才獨立顯示成「原授權人」
        if (isFamilyContinuation && inheritedPayment && inheritedPayment.payerName) {
          const pName = inheritedPayment.payerName;
          if (pName !== '其他' && pName !== proposerName && pName !== insuredName) {
            options.push({ id: pName, name: pName, role: '原授權人' });
          }
        }
        
        options.push({ id: '其他', name: '其他', role: '' });
        return options;
      };
      const payerOptions = getPayerOptions();

      const getQuickFillOptions = () => {
        const options = [];
        const currentInsuredId = formData.insured.id;
        const proposerPerson = formData.sameAsInsured ? formData.insured : formData.proposer;
        if (proposerPerson && proposerPerson.name && proposerPerson.id && proposerPerson.id !== currentInsuredId) {
          options.push({ ...proposerPerson });
        }
        familyDirectory.forEach(person => {
          if (person.id !== currentInsuredId && !options.some(opt => opt.id === person.id)) {
            options.push(person);
          }
        });
        return options;
      };
      const beneficiaryQuickOptions = getQuickFillOptions();

      const getInsuredQuickOptions = () => {
        const options = [];
        familyDirectory.forEach(person => {
          if (!pastInsuredIds.includes(person.id)) {
            options.push(person);
          }
        });
        return options;
      };
      const insuredQuickOptions = getInsuredQuickOptions();

      const getProposerQuickOptions = () => {
        const options = [];
        const currentInsuredId = formData.insured.id;
        familyDirectory.forEach(person => {
          if (person.id !== currentInsuredId) {
            options.push(person);
          }
        });
        return options;
      };
      const proposerQuickOptions = getProposerQuickOptions();

      // ==========================================
      // 處理函數
      // ==========================================
      const handleChange = (section, field, value) => {
        setFormData(prev => ({ ...prev, [section]: { ...prev[section], [field]: value } }));
      };

      const handleDateChange = (section, type, value, index = null) => {
        if (section === 'beneficiaries' && index !== null) {
          const newBens = [...formData.beneficiaries];
          newBens[index].birthDate[type] = value;
          setFormData(prev => ({ ...prev, beneficiaries: newBens }));
        } else {
          setFormData(prev => ({ ...prev, [section]: { ...prev[section], birthDate: { ...prev[section].birthDate, [type]: value } } }));
        }
      };

      const handleCardChange = (e, index) => {
        const val = e.target.value.replace(/\D/g, '');
        handleChange('payment', `card${index}`, val);
        if (val.length === 4 && index < 4) {
          document.getElementById(`card${index + 1}`).focus();
        }
      };

      const addBeneficiary = () => {
        setFormData(prev => ({ ...prev, beneficiaries: [...prev.beneficiaries, { key: Date.now() + Math.random(), rank: '1', name: '', uid: '', birthDate: { Y: '', M: '', D: '' }, relation: '' }] }));
      };

      const removeBeneficiary = (index) => {
        const newBens = [...formData.beneficiaries];
        newBens.splice(index, 1);
        setFormData(prev => ({ ...prev, beneficiaries: newBens }));
      };

      const updateBeneficiary = (index, field, value) => {
        const newBens = [...formData.beneficiaries];
        newBens[index][field] = value;
        setFormData(prev => ({ ...prev, beneficiaries: newBens }));
      };

      const fillBeneficiaryWithPerson = (index, person) => {
        if (!person) return;
        const newBens = [...formData.beneficiaries];
        newBens[index].name = person.name || '';
        newBens[index].uid = person.id || ''; 
        newBens[index].birthDate = { ...(person.birthDate || {Y:'', M:'', D:''}) };
        setFormData(prev => ({ ...prev, beneficiaries: newBens }));
      };

      const fillInsuredWithPerson = (person) => {
        if (!person) return;
        setFormData(prev => {
          const newState = {
            ...prev,
            insured: {
              ...prev.insured,
              name: person.name || '',
              id: person.id || '',
              birthDate: { ...(person.birthDate || {Y:'', M:'', D:''}) },
              phone: person.phone || prev.insured.phone,
              email: person.email || prev.insured.email,
              address: person.address || prev.insured.address,
              height: person.height || prev.insured.height,
              weight: person.weight || prev.insured.weight,
              workPlace: person.workPlace || prev.insured.workPlace,
              jobTitle: person.jobTitle || prev.insured.jobTitle,
              jobContent: person.jobContent || prev.insured.jobContent
            }
          };
          if (person.finance) {
            newState.financialInsured = { ...person.finance };
          }
          return newState;
        });
      };

      const fillProposerWithPerson = (person) => {
        if (!person) return;
        setFormData(prev => {
          const newState = {
            ...prev,
            proposer: {
              ...prev.proposer,
              name: person.name || '',
              id: person.id || '',
              birthDate: { ...(person.birthDate || {Y:'', M:'', D:''}) },
              phone: person.phone || prev.proposer.phone,
              email: person.email || prev.proposer.email,
              contactAddress: person.address || prev.proposer.contactAddress,
              billingAddress: person.address || prev.proposer.billingAddress,
              workPlace: person.workPlace || prev.proposer.workPlace,
              jobTitle: person.jobTitle || prev.proposer.jobTitle,
              jobContent: person.jobContent || prev.proposer.jobContent
            }
          };
          if (person.finance) {
            newState.financialProposer = { ...person.finance };
          }
          return newState;
        });
      };

      // --- 繳費變更 Y/N 橫桿切換邏輯 ---
      const handlePaymentToggle = (isChanging) => {
        setChangePayment(isChanging);
        if (isChanging) {
          setFormData(prev => ({
            ...prev,
            payment: {
              ...prev.payment,
              method: '銀行轉帳', bankInfo: '', bankAccount: '',
              card1: '', card2: '', card3: '', card4: '',
              cardExpiryMM: '01', cardExpiryYY: String(currentYY)
            }
          }));
        } else {
          if (inheritedPayment) {
            // 完全恢復原付款資訊，包含最重要的原授權人名字綁定
            setFormData(prev => ({ ...prev, payment: { ...inheritedPayment, payerSelection: inheritedPayment.payerName } }));
          }
        }
      };

      // --- 處理授權人選項改變 (超智慧連動防呆) ---
      const handlePayerChange = (optId) => {
        // 情況 A：家庭續保且有繼承付款人資訊
        if (isFamilyContinuation && inheritedPayment) {
          // 如果點擊的是原本付錢的那個人 (完全還原)
          if (optId === inheritedPayment.payerName) {
            setFormData(prev => ({ ...prev, payment: { ...inheritedPayment, payerSelection: optId } }));
            setChangePayment(false); // 自動跳回「沿用」
            return;
          } 
          // 如果點擊了其他人，且原本是「沿用」狀態
          else if (!changePayment) {
            setFormData(prev => ({
              ...prev,
              payment: {
                ...prev.payment,
                payerSelection: optId,
                method: '銀行轉帳', bankInfo: '', bankAccount: '',
                card1: '', card2: '', card3: '', card4: '',
                cardExpiryMM: '01', cardExpiryYY: String(currentYY)
              }
            }));
            setChangePayment(true); // 自動跳成「重填」
            setHighlightToggle(true); // 觸發紅橘色防呆警示
            setTimeout(() => setHighlightToggle(false), 2500);
            return;
          }
        }

        // 情況 B：正常切換人名 (非續保，或是已經在重填狀態下單純換按鈕)
        setFormData(prev => ({
          ...prev,
          payment: { ...prev.payment, payerSelection: optId }
        }));
      };

      // --- 家庭記憶接續填寫邏輯與「資料融合」通訊錄收集 ---
      const handleNextFamilyMember = () => {
        const currentInsuredId = formData.insured.id;
        if (currentInsuredId && !pastInsuredIds.includes(currentInsuredId)) {
          setPastInsuredIds(prev => [...prev, currentInsuredId]);
        }

        const extractPerson = (p, f) => {
          const personId = p?.id || p?.uid;
          if (!p?.name || !personId) return null;
          return { 
            name: p.name, 
            id: personId, 
            birthDate: p.birthDate,
            phone: p.phone || '',
            email: p.email || '',
            address: p.address || p.contactAddress || '',
            height: p.height || '',
            weight: p.weight || '',
            workPlace: p.workPlace || '',
            jobTitle: p.jobTitle || '',
            jobContent: p.jobContent || '',
            finance: f ? { ...f } : null
          };
        };

        const peopleToAdd = [
          extractPerson(formData.sameAsInsured ? formData.insured : formData.proposer, formData.sameAsInsured ? formData.financialInsured : formData.financialProposer),
          extractPerson(formData.insured, formData.financialInsured),
          ...formData.beneficiaries.map(b => extractPerson(b, null))
        ].filter(Boolean);

        // 進行「資料融合」，避免被空白資訊(例如受益人)洗掉豐富資訊
        const newDirMap = new Map(familyDirectory.map(p => [p.id, p]));
        peopleToAdd.forEach(p => {
          if (newDirMap.has(p.id)) {
            const existing = newDirMap.get(p.id);
            newDirMap.set(p.id, {
              ...existing,
              ...p,
              // 優先保留已有資料，防止被空白覆蓋
              phone: p.phone || existing.phone,
              email: p.email || existing.email,
              address: p.address || existing.address,
              height: p.height || existing.height,
              weight: p.weight || existing.weight,
              workPlace: p.workPlace || existing.workPlace,
              jobTitle: p.jobTitle || existing.jobTitle,
              jobContent: p.jobContent || existing.jobContent,
              finance: p.finance || existing.finance
            });
          } else {
            newDirMap.set(p.id, p);
          }
        });
        setFamilyDirectory(Array.from(newDirMap.values()));

        const proposerDataToKeep = formData.sameAsInsured ? {
          ...formData.insured,
          contactAddress: formData.insured.address,
          billingAddress: formData.insured.address,
          relation: '配偶' 
        } : formData.proposer;

        const financialProposerToKeep = formData.sameAsInsured ? {
          ...formData.financialInsured
        } : formData.financialProposer;

        let prevPayerName = '';
        if (formData.payment.payerSelection === '其他') prevPayerName = formData.payment.payerOtherName;
        else prevPayerName = formData.payment.payerSelection; 

        const paymentToKeep = {
          ...formData.payment,
          payerName: prevPayerName, 
          payerSelection: prevPayerName, // 精準鎖定姓名
          payerOtherName: ''
        };

        setInheritedPayment(paymentToKeep);
        setChangePayment(false);

        setFormData(prev => ({
          ...prev,
          sameAsInsured: false, 
          proposer: proposerDataToKeep, 
          financialProposer: financialProposerToKeep, 
          payment: paymentToKeep,
          insured: {
            name: '', id: '', birthDate: { Y: '', M: '', D: '' }, phone: '', email: '',
            height: '', weight: '', address: '', workPlace: '',
            jobTitle: '', jobContent: '', medicalHistory: ''
          },
          financialInsured: { 
            income: '', liabilities: '', depositBank: '', depositAmount: '', stockAmount: '', 
            immovableHas: '無', immovableAddr: '', immovableSize: '', immovableValue: '' 
          },
          beneficiaries: [
            { key: Date.now(), rank: '1', name: '', uid: '', birthDate: { Y: '', M: '', D: '' }, relation: '' }
          ]
        }));

        setIsFamilyContinuation(true); 
        setSubmitStatus(null);
        setCurrentStep(1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // 智慧驗證與送出邏輯
      const handleManualSubmit = async () => {
        if (!formRef.current) return;

        const invalidInputs = formRef.current.querySelectorAll(':invalid');
        
        if (invalidInputs.length > 0) {
          const firstInvalid = invalidInputs[0];
          const stepDiv = firstInvalid.closest('.step-container');
          
          if (stepDiv) {
            const stepNum = parseInt(stepDiv.dataset.step, 10);
            if (currentStep !== stepNum) {
              setCurrentStep(stepNum);
              setTimeout(() => {
                formRef.current.reportValidity();
                firstInvalid.focus();
              }, 100);
              return;
            }
          }
          formRef.current.reportValidity();
          firstInvalid.focus();
          return;
        }

        setIsSubmitting(true);
        setSubmitStatus(null);

        let finalPayerName = '';
        if (formData.payment.payerSelection === '其他') finalPayerName = formData.payment.payerOtherName;
        else finalPayerName = formData.payment.payerSelection;

        try {
          const payload = {
            insured: {
              ...formData.insured,
              birthdayY: formData.insured?.birthDate?.Y || '', 
              birthdayM: formData.insured?.birthDate?.M || '', 
              birthdayD: formData.insured?.birthDate?.D || '',
            },
            sameAsInsured: formData.sameAsInsured,
            proposer: formData.sameAsInsured ? {} : {
              ...formData.proposer,
              birthdayY: formData.proposer?.birthDate?.Y || '', 
              birthdayM: formData.proposer?.birthDate?.M || '', 
              birthdayD: formData.proposer?.birthDate?.D || '',
            },
            financialInsured: {
              income: formData.financialInsured?.income || '無',
              liabilities: formData.financialInsured?.liabilities || '無',
              movableType: '存款及股票/基金',
              bankName: formData.financialInsured?.depositBank || '',
              movableAmount: `存款: ${formData.financialInsured?.depositAmount || '無'}, 股票: ${formData.financialInsured?.stockAmount || '無'}`,
              immovableHas: formData.financialInsured?.immovableHas || '無',
              immovableSize: formData.financialInsured?.immovableSize || '', 
              immovableValue: formData.financialInsured?.immovableValue || '', 
              immovableAddr: formData.financialInsured?.immovableAddr || ''
            },
            financialProposer: formData.sameAsInsured ? { sameAsInsured: true } : {
              income: formData.financialProposer?.income || '無',
              liabilities: formData.financialProposer?.liabilities || '無',
              movableType: '存款及股票/基金',
              bankName: formData.financialProposer?.depositBank || '',
              movableAmount: `存款: ${formData.financialProposer?.depositAmount || '無'}, 股票: ${formData.financialProposer?.stockAmount || '無'}`,
              immovableHas: formData.financialProposer?.immovableHas || '無',
              immovableSize: formData.financialProposer?.immovableSize || '', 
              immovableValue: formData.financialProposer?.immovableValue || '', 
              immovableAddr: formData.financialProposer?.immovableAddr || ''
            },
            beneficiaries: formData.beneficiaries.filter(b => b.name).map(b => ({
              rank: b.rank, name: b.name, id: b.uid, relation: b.relation,
              birthdayY: b?.birthDate?.Y || '', birthdayM: b?.birthDate?.M || '', birthdayD: b?.birthDate?.D || ''
            })),
            
            payer: finalPayerName,
            
            paymentMethod: formData.payment.method, bankInfo: formData.payment.bankInfo, bankAccount: formData.payment.bankAccount,
            cardNumbers: [formData.payment.card1, formData.payment.card2, formData.payment.card3, formData.payment.card4],
            cardExpiryMM: formData.payment.cardExpiryMM, cardExpiryYY: formData.payment.cardExpiryYY,
            needNewCard: formData.needNewCard
          };

          payload.beneficiaries.push({ rank: '最後', name: "法定繼承人", id: "", relation: "法定繼承人", birthdayY: "", birthdayM: "", birthdayD: "" });

          await fetch(scriptUrl, { 
            method: "POST", 
            mode: "no-cors", 
            headers: { "Content-Type": "text/plain;charset=utf-8" }, 
            body: JSON.stringify(payload) 
          });

          setSubmitStatus('success');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (error) {
          console.error("提交失敗:", error);
          setSubmitStatus('error');
        } finally {
          setIsSubmitting(false);
        }
      };

      const nextStep = () => {
        const currentStepDiv = document.querySelector(`.step-container[data-step="${currentStep}"]`);
        const inputs = currentStepDiv.querySelectorAll('input[required], select[required], textarea[required]');
        let isValid = true;
        for (let input of inputs) {
          if (!input.checkValidity()) {
            input.reportValidity();
            isValid = false;
            break;
          }
        }
        if (isValid) {
          setCurrentStep(prev => Math.min(prev + 1, totalSteps));
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      const prevStep = () => {
        setCurrentStep(prev => Math.max(prev - 1, 1));
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const InputLabel = ({ children, required, className }) => (
        <label className={`block text-sm font-bold text-gray-700 ml-1 ${className}`}>
          {children} {required && <span className="text-red-500">*</span>}
        </label>
      );

      const baseInputClass = "w-full rounded-2xl bg-gray-50 border border-gray-200/60 p-3.5 text-gray-800 text-base focus:bg-white focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all placeholder:text-gray-400";
      const cardInputClass = "min-w-0 flex-1 rounded-xl bg-white border border-gray-200/60 py-3.5 px-0.5 sm:px-3 text-center text-gray-800 text-base sm:text-lg font-mono font-bold focus:bg-white focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all shadow-sm tracking-normal";

      const DateSelector = ({ section, index = null }) => {
        const data = index !== null ? formData[section][index].birthDate : formData[section].birthDate;
        return (
          <div className="flex gap-2">
            <select required className={`${baseInputClass} flex-1 px-2 font-medium`} value={data.Y} onChange={e => handleDateChange(section, 'Y', e.target.value, index)}>
              <option value="" disabled>民國年</option>
              {years.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
            <select required className={`${baseInputClass} flex-1 px-2 font-medium`} value={data.M} onChange={e => handleDateChange(section, 'M', e.target.value, index)}>
              <option value="" disabled>月</option>{months.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
            <select required className={`${baseInputClass} flex-1 px-2 font-medium`} value={data.D} onChange={e => handleDateChange(section, 'D', e.target.value, index)}>

                    {/* 背景裝飾 */}
                    <div className="absolute top-0 right-0 -mt-10 -mr-10 w-48 h-48 bg-blue-400/20 rounded-full blur-3xl"></div>
                    <div className="absolute bottom-0 left-0 -mb-10 -ml-10 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl"></div>

                    <div className="relative z-10">
                      <div className="bg-gradient-to-br from-yellow-300 to-yellow-500 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-yellow-500/30 border border-yellow-200">
                        <Gift className="w-10 h-10 text-blue-900" />
                      </div>
                      <h2 className="text-2xl sm:text-3xl font-black text-white mb-4 tracking-wide">專屬優惠與辦卡需求</h2>
                      
                      <div className="bg-white/10 backdrop-blur-md rounded-2xl p-5 mb-8 border border-white/10 shadow-inner">
                        <p className="text-blue-50 leading-relaxed text-base sm:text-lg font-medium">
                          使用富邦信用卡繳保費，可享 <strong className="text-yellow-300 text-xl mx-1 font-black drop-shadow-md">1% 折扣</strong> 
                          及 <strong className="text-yellow-300 text-xl mx-1 font-black drop-shadow-md">5 萬以上 12 期零利率</strong>。
                        </p>
                      </div>
                      
                      <div className="bg-white rounded-[2rem] p-6 sm:p-8 shadow-2xl">
                        <h3 className="font-black text-gray-800 mb-6 text-lg">是否需要專員協助辦理新卡？</h3>
                        <div className="flex flex-col sm:flex-row gap-4 mb-2">
                          <label className={`flex-1 py-5 text-center rounded-2xl border-2 cursor-pointer transition-all shadow-sm active:scale-95 ${formData.needNewCard === '是' ? 'border-blue-600 bg-blue-600 text-white font-black shadow-blue-600/30' : 'border-gray-200 text-gray-500 hover:bg-gray-50 font-bold'}`}>
                            <input type="radio" name="needCard" className="hidden" checked={formData.needNewCard === '是'} onChange={() => setFormData({...formData, needNewCard: '是'})} />
                            ✨ 是，請協助辦理
                          </label>
                          <label className={`flex-1 py-5 text-center rounded-2xl border-2 cursor-pointer transition-all shadow-sm active:scale-95 ${formData.needNewCard === '否' ? 'border-gray-800 bg-gray-800 text-white font-black shadow-gray-800/30' : 'border-gray-200 text-gray-500 hover:bg-gray-50 font-bold'}`}>
                            <input type="radio" name="needCard" className="hidden" checked={formData.needNewCard === '否'} onChange={() => setFormData({...formData, needNewCard: '否'})} />
                            暫不需要
                          </label>
                        </div>
                      </div>
                      
                      {/* 大面積醒目確認送出按鈕 (Step 6 限定) */}
                      <div className="mt-8">
                        <button 
                          type="button" 
                          onClick={handleManualSubmit}
                          disabled={isSubmitting}
                          className={`w-full py-5 rounded-[2rem] text-xl font-black text-white shadow-2xl transition-all flex justify-center items-center ${
                            isSubmitting ? 'bg-gray-500 cursor-not-allowed opacity-80' : 'bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 active:scale-[0.98] shadow-green-500/40 ring-4 ring-green-500/20'
                          }`}
                        >
                          {isSubmitting ? '資料加密傳送中...' : <><Send className="w-6 h-6 mr-3"/> 確認無誤並送出表單</>}
                        </button>
                        <p className="text-blue-200/60 text-xs mt-4">點擊送出即代表您同意本表單之隱私聲明</p>
                      </div>

                    </div>
                  </div>
                </div>

                {/* 手機版懸浮底部導覽列 (毛玻璃效果) - 當處於最後一頁時隱藏送出按鈕以防重複 */}
                <div className={`fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl border-t border-gray-200/50 p-4 pb-[env(safe-area-inset-bottom,1rem)] z-50 md:relative md:bg-transparent md:backdrop-blur-none md:border-none md:p-0 md:mt-10 flex justify-between gap-3 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] md:shadow-none ${currentStep === 6 ? 'hidden md:flex' : 'flex'}`}>
                  <button 
                    type="button" 
                    onClick={currentStep === 1 ? undefined : prevStep}
                    className={`w-14 sm:w-auto sm:flex-1 py-4 sm:px-6 rounded-2xl font-black transition-all flex justify-center items-center shadow-sm ${
                      currentStep === 1 ? 'opacity-0 pointer-events-none' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 hover:text-gray-900 active:scale-95'
                    }`}
                  >
                    <ChevronLeft className="w-6 h-6 sm:mr-1" /> <span className="hidden sm:inline">返回上一步</span>
                  </button>

                  {currentStep < totalSteps ? (
                    <button 
                      type="button" 
                      onClick={nextStep}
                      className="flex-[3] py-4 rounded-2xl text-lg font-black text-white bg-blue-600 hover:bg-blue-500 active:bg-blue-700 shadow-xl shadow-blue-600/30 transition-all flex justify-center items-center active:scale-95"
                    >
                      下一步 <ChevronRight className="w-5 h-5 ml-1" />
                    </button>
                  ) : (
                    <div className="flex-[3] hidden md:block">
                       {/* 電腦版才顯示佔位符，因為手機版按鈕已藏 */}
                    </div>
                  )}
                </div>
                
              </form>
            )}
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
